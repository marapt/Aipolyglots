services:
  - type: web
    name: aipolyglots-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGINS
        value: "https://aipolyglots.com,https://www.aipolyglots.com"
      # These variables must be populated in the Render dashboard manually for security
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: OPENAI_API_KEY
        sync: false
